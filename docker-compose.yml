version: "3.9"

services:
  server:
    build:
      context: .
      dockerfile: server/Dockerfile
    ports:
      - "3001:3001"
    environment:
      PORT: 3001
      CLIENT_URL: "http://localhost:5173"
      REDIS_URL: "redis://redis:6379"
      DATABASE_URL: "postgresql://cabo:cabo@postgres:5432/cabo"
      JWT_SECRET: "change-me-in-production"
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: cabo
      POSTGRES_USER: cabo
      POSTGRES_PASSWORD: cabo
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cabo"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  pgdata:
